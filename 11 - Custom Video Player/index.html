<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>HTML Video Player</title>
		<link rel="stylesheet" href="./style.css" />
		<link rel="icon" href="https://fav.farm/🔥" />
	</head>
	<body>
		<div class="player">
			<video class="player__video viewer" src="652333414.mp4" data-video></video>
			<div class="player__controls">
				<div class="progress" data-progress>
					<div class="progress__filled"></div>
				</div>
				<button class="player__button toggle" title="Toggle Play" data-toggle>►</button>
				<input
					type="range"
					name="volume"
					class="player__slider"
					min="0"
					max="1"
					step="0.05"
					value="1"
					data-range="volume"
				/>
				<input
					type="range"
					name="playbackRate"
					class="player__slider"
					min="0.5"
					max="2"
					step="0.1"
					value="1"
					data-range="playbackRate"
				/>
				<button class="player__button" data-skip="-10">« 10s</button>
				<button class="player__button" data-skip="25">25s »</button>
				<button class="player__button" data-fullscreen>⛶</button>
			</div>
		</div>
		<script src="./scripts.js"></script>
	</body>
</html>
