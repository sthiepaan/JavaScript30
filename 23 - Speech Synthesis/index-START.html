<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Speech Synthesis</title>
		<link
			href="https://fonts.googleapis.com/css?family=Pacifico"
			rel="stylesheet"
			type="text/css"
		/>
		<link rel="stylesheet" href="style.css" />
		<link rel="icon" href="https://fav.farm/🔥" />
	</head>
	<body>
		<div class="voiceinator" data-voiceinator>
			<h1>The Voiceinator 5000</h1>
			<select name="voice" id="voices">
				<option value="" data-voices>Select A Voice</option>
			</select>
			<label for="rate">Rate:</label>
			<input name="rate" type="range" min="0" max="3" value="1" step="0.1" />
			<label for="pitch">Pitch:</label>
			<input name="pitch" type="range" min="0" max="2" step="0.1" />
			<textarea name="text" data-text>Hello! I love JavaScript 👍</textarea>
			<button id="stop" data-stop>Stop!</button>
			<button id="speak" data-speak>Speak</button>
		</div>
		<script src="./scripts.js"></script>
	</body>
</html>
