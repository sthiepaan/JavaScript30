<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>JS + CSS Clock</title>
		<link rel="stylesheet" href="style.css" />
		<link rel="icon" href="https://fav.farm/🔥" />
	</head>
	<body>
		<div class="clock">
			<div class="clock-face">
				<div class="hand hour-hand" data-clock-hours></div>
				<div class="hand min-hand" data-clock-minutes></div>
				<div class="hand second-hand" data-clock-seconds></div>
			</div>
		</div>
		<script src="./scripts.js"></script>
	</body>
</html>
